{% extends "base.html" %}
{% block title %}Đặt lại mật khẩu{% endblock %}

{% block content %}
<style>
    .content-area { background: transparent !important; box-shadow: none !important; margin: 0 !important; padding: 0 !important; }
    .login-wrapper { height: calc(100vh - 80px); display: flex; align-items: center; justify-content: center; }
    .login-card { background: #ffffff; width: 100%; max-width: 440px; border-radius: 28px; padding: 48px 40px 36px; box-shadow: 0 12px 32px rgba(0, 0, 0, 0.05); border: 1px solid rgba(0,0,0,0.04); }
    .login-logo { width: 64px; margin-bottom: 16px; }
    .login-title { font-family: 'Google Sans', sans-serif; font-size: 28px; font-weight: 400; color: #1f1f1f; margin-bottom: 8px; }
    .login-subtitle { color: #444746; font-size: 15px; margin-bottom: 30px; }
    .md-input-group { position: relative; margin-bottom: 24px; }
    .md-input { width: 100%; padding: 16px 14px; font-size: 16px; border: 1px solid #747775; border-radius: 4px; background: #ffffff; color: #1f1f1f; transition: 0.15s; }
    .md-input:focus { outline: none; border: 2px solid #0b57d0; padding: 15px 13px; }
    .md-label { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); background: #ffffff; padding: 0 4px; color: #444746; font-size: 16px; transition: 0.15s; pointer-events: none; }
    .md-input:focus ~ .md-label, .md-input:not(:placeholder-shown) ~ .md-label { top: 0; font-size: 12px; font-weight: 500; color: #0b57d0; }
    .btn-login { background: #0b57d0; color: #ffffff; border: none; border-radius: 100px; padding: 10px 24px; font-size: 14px; font-weight: 500; transition: 0.2s; }
    .btn-login:hover { background: #0842a0; }
</style>

<div class="login-wrapper">
    <div class="login-card text-center">
        <i class="fas fa-shield-alt fa-3x text-success mb-3"></i>
        <h1 class="login-title">Đổi mật khẩu</h1>
        <p class="login-subtitle">Thiết lập mật khẩu mới cho tài khoản: <br><strong class="text-dark">{{ username }}</strong></p>

        <form action="{{ url_for('reset_password', token=token) }}" method="post" class="text-start mt-2">
            <div class="md-input-group">
                <input type="password" class="md-input" id="password" name="password" placeholder=" " required minlength="6">
                <label class="md-label" for="password">Mật khẩu mới (tối thiểu 6 ký tự)</label>
            </div>
            
            <div class="d-flex justify-content-end align-items-center mt-5">
                <button type="submit" class="btn-login">Cập nhật mật khẩu</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
