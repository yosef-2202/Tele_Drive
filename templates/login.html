<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - {{ site_name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #eef2f6; font-family: 'Google Sans', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .login-card { background: #ffffff; width: 100%; max-width: 420px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); overflow: hidden; }
        .login-header { background: #0b57d0; color: white; padding: 40px 20px 50px; text-align: center; clip-path: polygon(0 0, 100% 0, 100% 88%, 0 100%); margin-bottom: -15px; }
        .login-body { padding: 30px 40px 40px; }
        .input-group-custom .input-group-text { background: #f8f9fa; border: 1px solid #e0e0e0; border-right: none; color: #6c757d; border-radius: 8px 0 0 8px; }
        .input-group-custom .form-control { background: #f8f9fa; border: 1px solid #e0e0e0; border-left: none; padding: 12px 15px; border-radius: 0 8px 8px 0; box-shadow: none; }
        .input-group-custom .form-control:focus { background: #ffffff; border-color: #0b57d0; }
        .input-group-custom .form-control:focus + .input-group-text, .input-group-custom .form-control:focus ~ .input-group-text { border-color: #0b57d0; background: #ffffff; }
        .btn-login { background: #0b57d0; color: white; font-weight: 600; padding: 12px; border-radius: 100px; width: 100%; border: none; transition: 0.2s; }
        .btn-login:hover { background: #0842a0; }
        .swal2-popup { border-radius: 20px !important; font-family: 'Google Sans', sans-serif !important; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <i class="fas fa-cloud fa-3x mb-3"></i>
        <h2 class="fw-bold mb-1">{{ site_name }}</h2>
        <p class="mb-0 opacity-75">Hệ thống lưu trữ Đám mây</p>
    </div>
    <div class="login-body">
        
        {% if require_2fa %}
            <h5 class="text-primary text-center fw-bold mb-3"><i class="fas fa-shield-alt me-2"></i>Xác minh 2 Bước</h5>
            <p class="text-center text-secondary small mb-4">Mã đăng nhập đã được gửi tới <b>{{ email_masked }}</b></p>
            <form action="{{ url_for('login') }}" method="post">
                <input type="hidden" name="action" value="verify_2fa">
                <div class="mb-4">
                    <input type="text" name="otp_code" class="form-control form-control-lg text-center fw-bold bg-light border-0" style="letter-spacing: 5px; font-size: 24px; border-radius: 12px;" placeholder="------" required autocomplete="off" autofocus>
                </div>
                <button type="submit" class="btn-login shadow-sm"><i class="fas fa-check-circle me-2"></i>Xác nhận</button>
                <div class="text-center mt-3"><a href="{{ url_for('login') }}" class="text-secondary small fw-medium text-decoration-none">Hủy bỏ</a></div>
            </form>

        {% else %}
            <h5 class="text-center fw-bold mb-4">ĐĂNG NHẬP</h5>
            <form action="{{ url_for('login') }}" method="post">
                <div class="input-group input-group-custom mb-3"><span class="input-group-text"><i class="fas fa-user"></i></span><input type="text" class="form-control" name="username" placeholder="Tên tài khoản" required autocomplete="off"></div>
                <div class="input-group input-group-custom mb-3"><span class="input-group-text"><i class="fas fa-lock"></i></span><input type="password" class="form-control" name="password" placeholder="Mật khẩu" required></div>
                <div class="d-flex justify-content-between align-items-center mb-4 small fw-medium">
                    <div class="form-check"><input class="form-check-input" type="checkbox" value="1" id="remember" name="remember" checked><label class="form-check-label text-secondary" for="remember">Ghi nhớ</label></div>
                    <a href="{{ url_for('forgot_password') }}" class="text-decoration-none">Quên mật khẩu?</a>
                </div>
                <button type="submit" class="btn-login shadow-sm">ĐĂNG NHẬP</button>
                <div class="text-center mt-4 small fw-medium">
                    {% if allow_registration %}
                    <a href="{{ url_for('register') }}" class="text-success text-decoration-none"><i class="fas fa-user-plus me-1"></i> Tạo tài khoản mới</a>
                    {% else %}
                    <span class="text-danger"><i class="fas fa-lock me-1"></i> Đăng ký đang đóng</span>
                    {% endif %}
                </div>
            </form>
        {% endif %}
        
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, timerProgressBar: true });
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                Toast.fire({ icon: '{{ 'error' if category == 'error' else 'success' }}', title: '{{ message }}' });
            {% endfor %}
        {% endif %}
    {% endwith %}
</script>
</body>
</html>
