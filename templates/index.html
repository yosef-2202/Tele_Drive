<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleCloud - Drive</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">

    <!-- Top Navbar -->
    <nav class="navbar d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center">
            <div class="brand-text ms-2 text-light fw-bold"><i class="fas fa-cloud me-2 text-primary"></i>TeleCloud</div>
        </div>
        <div class="d-flex align-items-center gap-3">
            <div class="user-avatar">Y</div>
        </div>
    </nav>

    <!-- Main Layout -->
    <div class="main-container">
        <!-- Sidebar -->
        <div class="sidebar-wrapper" id="sidebar">
            <button class="btn btn-drive-new"><i class="fas fa-plus"></i> Mới</button>
            <a href="#" class="nav-link active"><i class="fas fa-home"></i> Trang chủ</a>
            <a href="#" class="nav-link"><i class="fas fa-hdd"></i> Ổ đĩa của tôi</a>
            <a href="#" class="nav-link"><i class="fas fa-users"></i> Được chia sẻ</a>
            <a href="#" class="nav-link"><i class="fas fa-trash"></i> Thùng rác</a>
        </div>

        <!-- Content Area -->
        <div class="content-area">
            <h5 class="drive-section-title text-light">Tệp gần đây</h5>
            
            <div class="row g-3">
                <!-- Card Image -->
                <div class="col-6 col-md-4 col-lg-3">
                    <div class="drive-file-card" onclick="openMediaViewer('image', '12345', 'photo_2026.jpg', '156 KB', '20/04/2026')">
                        <div class="item-checkbox-wrapper"><input type="checkbox" class="item-checkbox" onclick="event.stopPropagation()"></div>
                        <div class="file-action-dropdown">
                            <button class="btn btn-dots" onclick="event.stopPropagation()"><i class="fas fa-ellipsis-v"></i></button>
                        </div>
                        <div class="drive-file-preview bg-dark">
                            <i class="fas fa-image fa-3x text-info"></i>
                        </div>
                        <div class="drive-file-info">
                            <div class="drive-file-name text-light text-truncate">photo_2026.jpg</div>
                        </div>
                    </div>
                </div>

                <!-- Card Video -->
                <div class="col-6 col-md-4 col-lg-3">
                    <div class="drive-file-card" onclick="openMediaViewer('video', '67890', 'Fern x Stark.mp4', '483 MB', '20/04/2026')">
                        <div class="item-checkbox-wrapper"><input type="checkbox" class="item-checkbox" onclick="event.stopPropagation()"></div>
                        <div class="file-action-dropdown">
                            <button class="btn btn-dots" onclick="event.stopPropagation()"><i class="fas fa-ellipsis-v"></i></button>
                        </div>
                        <div class="drive-file-preview bg-dark">
                            <i class="fas fa-play-circle fa-4x text-danger"></i>
                        </div>
                        <div class="drive-file-info">
                            <div class="drive-file-name text-light text-truncate">Fern x Stark.mp4</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Xem Hình Ảnh -->
    <div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content custom-dark-modal">
                <div class="modal-header border-0">
                    <div class="d-flex align-items-center">
                        <div class="icon-wrapper me-2"><i class="fas fa-image"></i></div>
                        <div>
                            <h6 class="modal-title mb-0" id="imgName"></h6>
                            <small class="text-muted">Hình ảnh</small>
                        </div>
                    </div>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center px-4">
                    <img id="previewImage" src="" class="img-fluid rounded-3 mb-3" alt="Preview" style="max-height: 300px; object-fit: contain;">
                    <div class="info-box text-start p-3 rounded-3 mb-4">
                        <div class="d-flex justify-content-between mb-2"><span class="text-muted">Kích thước:</span> <strong id="imgSize"></strong></div>
                        <div class="d-flex justify-content-between mb-2"><span class="text-muted">Ngày tải lên:</span> <strong id="imgDate"></strong></div>
                        <div class="d-flex justify-content-between"><span class="text-muted">Trạng thái:</span> <strong class="text-success">Riêng tư (Private)</strong></div>
                    </div>
                    <button class="btn btn-primary w-100 rounded-pill py-2 mb-3"><i class="fas fa-download"></i> Tải xuống</button>
                    <div class="d-flex justify-content-between px-3">
                        <button class="btn btn-action-sm"><i class="fas fa-link mb-1 fs-5"></i><br>Tạo Link</button>
                        <button class="btn btn-action-sm"><i class="fas fa-exchange-alt mb-1 fs-5"></i><br>Di chuyển</button>
                        <button class="btn btn-action-sm"><i class="fas fa-pen mb-1 fs-5"></i><br>Đổi tên</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Phát Video -->
    <div class="modal fade" id="videoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content custom-dark-modal">
                <div class="modal-header border-0 pb-0">
                    <div class="d-flex align-items-center">
                        <div class="icon-wrapper bg-danger bg-opacity-25 me-2"><i class="fas fa-film text-danger"></i></div>
                        <h6 class="modal-title mb-0" id="videoName"></h6>
                    </div>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-3">
                    <video id="previewVideo" controls class="w-100 rounded-3 shadow-sm bg-black" style="max-height: 60vh;">
                        <source src="" type="video/mp4">
                        Trình duyệt không hỗ trợ phát video.
                    </video>
                    <div class="mt-3">
                        <button class="btn btn-info w-100 rounded-pill py-2 text-white"><i class="fas fa-cloud-download-alt"></i> Tải Xuống</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
