{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="height: 100%;">
    <div class="card border border-light-subtle shadow-sm p-5 text-center" style="width: 100%; max-width: 450px; border-radius: 28px;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/da/Google_Drive_logo.png" width="60" class="mx-auto mb-3" alt="Logo">
        <h3 class="fw-normal mb-1 text-dark">Tạo tài khoản</h3>
        <p class="text-secondary mb-4">Tham gia Telegram Cloud Storage</p>
        
        <form action="{{ url_for('register') }}" method="post" class="text-start mt-3">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="username" name="username" placeholder="Username" required autocomplete="off">
                <label for="username">Tên đăng nhập</label>
            </div>
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
                <label for="email">Địa chỉ Email</label>
            </div>
            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                <label for="password">Mật khẩu</label>
            </div>
            
            <div class="d-flex justify-content-between align-items-center mt-4">
                <a href="{{ url_for('login') }}" class="text-decoration-none fw-medium text-primary">Đã có tài khoản?</a>
                <button type="submit" class="btn btn-primary rounded-pill px-4 py-2 fw-medium">Đăng ký</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
